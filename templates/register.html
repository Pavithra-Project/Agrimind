{% extends "base.html" %}

{% block public_content %}
<div class="auth-page">
    <div class="auth-card glass">
        <h2>Create Account</h2>
        <p class="auth-subtitle">Join us to start your smart farming journey.</p>

        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-with-icon">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="username" name="username" required autocomplete="username" class="form-control" placeholder="Choose a username">
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-with-icon">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" name="email" required autocomplete="email" class="form-control" placeholder="example@email.com">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-with-icon">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" name="password" required autocomplete="new-password" class="form-control" placeholder="Create a strong password">
                </div>
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">
                <i class="fa-solid fa-user-plus"></i> Join AgriMind
            </button>
        </form>

        <div class="auth-footer">
            <p>Already a member? <a href="{{ url_for('login') }}">Login here →</a></p>
        </div>
    </div>
</div>
{% endblock %}
